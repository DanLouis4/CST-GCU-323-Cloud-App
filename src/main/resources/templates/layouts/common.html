<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
            <title th:text="${title}">RPG Character Tracker</title>
</head>
<body>
    <!-- Common Header Fragment -->
	<div th:fragment="header">
	    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
	        <div class="container-fluid">
	            <a class="navbar-brand fw-bold text-success trade-winds-regular d-flex align-items-center" href="/">
	               DenizenRPG
	            </a>

				<!-- Mobile toggle -->
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				    <span class="navbar-toggler-icon"></span>
				</button>

				<!-- Navigation links -->
				<div class="collapse navbar-collapse" id="navbarNav">
				    <!-- Left side links -->
				    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
				        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
				        <li class="nav-item"><a class="nav-link" href="/characters">Characters</a></li>
				        <li class="nav-item"><a class="nav-link" href="/characters/create">Create</a></li>
				        <li class="nav-item"><a class="nav-link" href="/">About</a></li>
				    </ul>

                    <!-- Right side links -->
                    <!-- User Not Signed In -->
					<ul class="navbar-nav ms-auto" th:if="${session.user == null}">
						<li class="nav-item"><a class="nav-link" href="/signin">Sign In</a></li>
						<li class="nav-item"><a class="nav-link" href="/signup">Sign Up</a></li>
					</ul>

                    <!-- User Signed In -->
					<ul class="navbar-nav ms-auto" th:if="${session.user != null}">
						<li class="nav-item dropdown">
							<a class="nav-link dropdown-toggle"
							href="#"
							id="userDropdown"
							role="button"
							data-bs-toggle="dropdown"
							aria-expanded="false">

								Welcome, <span th:text="${session.user.username}"></span>
							</a>

                            <!-- User Dropdown Menu -->
							<ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">

								<li>
									<a class="dropdown-item disabled" href="#">Favorites</a>
								</li>

								<li>
									<a class="dropdown-item disabled" href="#">Settings</a>
								</li>

								<li><hr class="dropdown-divider"></li>

								<li>
									<a class="dropdown-item text-danger" href="/signout">Sign Out</a>
								</li>

							</ul>
						</li>
					</ul>
	            </div>
	        </div>
	    </nav>
	</div>

    <!-- Common Footer Fragment -->
	<div th:fragment="footer">
	    <footer class="bg-light text-center text-muted py-3 mt-auto">
	        <p class="mb-0">&copy; 2026 DenizenRPG Character Tracker. All rights reserved.</p>
	    </footer>
    	</div>
</body>
</html>
