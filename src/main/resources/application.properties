spring.application.name=cloud-app

# Use env vars if present, otherwise fall back to local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rpg_characters}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.thymeleaf.cache=false

logging.pattern.console=%-5level [%thread] %logger{36} - %msg%n
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
